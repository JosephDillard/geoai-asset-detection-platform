# Define request-time model choices and up to 10 GeoAI workflows.
# Paths are relative to this catalog file.
models:
  - id: building-detection
    name: Detect buildings
    description: Identify building footprints from high-resolution RGB aerial imagery.
    asset_type: buildings
    geometry_type: polygon
    workflow_ids:
      - buildings-whu-taos-local
      - buildings-whu-taos-postgis
      - buildings-whu-taos-threshold-sweep

  - id: road-detection
    name: Detect roads
    description: Identify road surfaces from local imagery and optionally load results to PostGIS.
    asset_type: roads
    geometry_type: polygon
    workflow_ids:
      - roads-local
      - roads-local-postgis
      - roads-hf-unet-new-mexico-local
      - roads-hf-unet-new-mexico-postgis
      - roads-new-mexico-local
      - roads-new-mexico-postgis

  - id: solar-panel-detection
    name: Detect solar panels
    description: Identify solar panel arrays from imagery. Workflow config is not enabled yet.
    asset_type: solar_panels
    geometry_type: polygon
    workflow_ids: []

  - id: electric-pole-detection
    name: Detect electric poles
    description: Identify electric utility poles from imagery. Workflow config is not enabled yet.
    asset_type: electric_poles
    geometry_type: point
    workflow_ids: []

workflows:
  - id: roads-local
    name: Demo road detection - synthetic COG
    type: roads
    model: road-detection
    enabled: true
    config: roads.example.yaml
    stages: [tile, infer, vectorize]

  - id: roads-local-postgis
    name: Demo road detection - synthetic COG to PostGIS
    type: roads
    model: road-detection
    enabled: false
    config: roads.example.yaml
    stages: [tile, infer, vectorize, load-postgis]
    postgis:
      if_exists: append

  - id: roads-new-mexico-local
    name: Taos, New Mexico NAIP sample - demo model
    type: roads
    model: road-detection
    enabled: false
    config: roads.new-mexico.example.yaml
    stages: [tile, infer, vectorize]

  - id: roads-hf-unet-new-mexico-local
    name: Taos, New Mexico NAIP sample - HF U-Net/Keras
    type: roads
    model: road-detection
    enabled: false
    config: roads.hf-unet-new-mexico.example.yaml
    stages: [tile, infer, vectorize]

  - id: roads-hf-unet-new-mexico-postgis
    name: Taos, New Mexico NAIP sample to PostGIS - HF U-Net/Keras
    type: roads
    model: road-detection
    enabled: false
    config: roads.hf-unet-new-mexico.example.yaml
    stages: [tile, infer, vectorize, load-postgis]
    postgis:
      if_exists: append

  - id: roads-new-mexico-postgis
    name: Taos, New Mexico NAIP sample to PostGIS - demo model
    type: roads
    model: road-detection
    enabled: false
    config: roads.new-mexico.example.yaml
    stages: [tile, infer, vectorize, load-postgis]
    postgis:
      if_exists: append

  - id: buildings-whu-taos-local
    name: Taos, New Mexico NAIP sample - WHU building model
    type: roads
    model: building-detection
    enabled: false
    config: buildings.whu-taos.example.yaml
    stages: [tile, infer, vectorize]

  - id: buildings-whu-taos-postgis
    name: Taos, New Mexico NAIP sample to PostGIS - WHU building model
    type: roads
    model: building-detection
    enabled: true
    config: buildings.whu-taos.example.yaml
    stages: [tile, infer, vectorize, load-postgis]
    postgis:
      if_exists: append

  - id: buildings-whu-taos-threshold-sweep
    name: Taos, New Mexico NAIP sample threshold sweep - WHU building model
    type: roads
    model: building-detection
    enabled: false
    config: buildings.whu-taos.example.yaml
    stages: [tile, infer, threshold-sweep]
    postgis:
      if_exists: append

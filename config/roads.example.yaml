project:
  name: road-detection
  processing_crs: EPSG:3857
  output_crs: EPSG:4326

imagery:
  # Point this at a Cloud Optimized GeoTIFF or local GeoTIFF.
  source: data/imagery/example-cog.tif
  bands: [1, 2, 3]

tiling:
  tile_size: 1024
  overlap: 128
  output_dir: data/tiles

model:
  # Export your road segmentation model to ONNX and place it here.
  # Expected input: RGB image tensor shaped [1, 3, H, W].
  path: models/road-segmentation.onnx
  backend: onnx
  input_size: 1024
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  output_name:

inference:
  threshold: 0.5
  batch_size: 1
  mask_dir: outputs/road_masks

vectorization:
  min_area_m2: 15
  simplify_tolerance_m: 0.5
  smooth_tolerance_m: 1.0
  # Guardrails for accidental demo-scale output. Re-run scripts/create_demo_assets.py
  # if an older EPSG:4326 demo COG exists locally.
  max_source_pixel_size_m: 5
  max_mask_coverage: 0.35
  output: outputs/roads.gpkg

postgis:
  # Default targets the geospatial-status-board local Docker PostGIS stack.
  url: postgresql+psycopg://gsb:gsb@localhost:5432/geostatusboard
  schema: public
  table: detected_roads
